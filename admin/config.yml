backend:
  name: github
  repo: lewisb13/Portfolio
  branch: main
  base_url: https://decap-auth.lewisb13.workers.dev
  auth_endpoint: auth
  site_domain: lewisb.dev

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "blog"
    label: "Blog Posts"
    folder: "content/blog"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Tags", name: "tags", widget: "list", required: false }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "videos"
    label: "Videos"
    folder: "content/videos"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "YouTube URL", name: "youtube", widget: "string" }
      - { label: "Category", name: "category", widget: "string" }
      - { label: "Description", name: "body", widget: "markdown" }

  - name: "projects"
    label: "Projects"
    folder: "content/projects"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Project Name", name: "title", widget: "string" }
      - { label: "Tech Stack", name: "tech", widget: "list", required: false }
      - { label: "GitHub Link", name: "github", widget: "string", required: false }
      - { label: "Live Demo", name: "demo", widget: "string", required: false }
      - { label: "Description", name: "body", widget: "markdown" }