<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tutorials | Lewis Barrett Portfolio</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="nav-container">
      <a href="index.html" class="logo">Lewis Barrett Portfolio</a>
      <nav class="navbar">
        <a href="tutorials.html" class="active">Tutorials</a>
        <a href="contact.html">Contact</a>
        <a href="blog.html">Blog</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="page-header">
      <h1>Tutorials</h1>
      <p>Videos, walkthroughs, and learning resources.</p>
    </section>

    <section class="grid" id="video-grid"></section>
  </main>

  <script src="videos.js"></script>
  <script>
    const videoGrid = document.getElementById("video-grid");

    videos.forEach((video) => {
      const card = document.createElement("article");
      card.className = "card";

      card.innerHTML = `
        <div class="video-wrapper">
          <iframe
            src="${video.embedUrl}"
            title="${video.title}"
            loading="lazy"
            referrerpolicy="strict-origin-when-cross-origin"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
            allowfullscreen>
          </iframe>
        </div>
        <h2>${video.title}</h2>
        <p>${video.description}</p>
      `;

      videoGrid.appendChild(card);
    });
  </script>
</body>
</html>
