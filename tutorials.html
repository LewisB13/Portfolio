<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tutorials | Lewis Barrett</title>

  <link rel="stylesheet" href="styles.css" />
</head>

<body>

  <!-- HEADER -->
  <header class="site-header">
    <div class="nav-container">

      <a href="index.html" class="logo">Lewis Barrett Portfolio</a>

      <nav class="navbar">
        <a href="index.html">Home</a>
        <a href="projects.html">Projects</a>
        <a href="tutorials.html" class="active">Tutorials</a>
        <a href="notes.html">Notes</a>
        <a href="contact.html">Contact</a>
        <a href="https://www.github.com/lewisb13" target="_blank">GitHub</a>
      </nav>

    </div>
  </header>

  <!-- MAIN -->
  <main class="container">

    <section class="page-header">
      <h1>Tutorials</h1>
      <p>
        Guides, walkthroughs, and lessons based on real projects in Linux, Docker, Java, and self-hosting.
      </p>
    </section>

    <!-- CATEGORY GRID (UNCHANGED) -->
    <section class="category-grid" id="tutorial-category-grid">
      <p>Loading categories...</p>
    </section>

    <!-- CONTROLS BAR -->
    <section class="video-panel">

      <div class="video-panel-top">

        <h2 id="selected-category-title">Latest Tutorials</h2>

        <!-- RIGHT CONTROLS -->
        <div class="sort-bar">

          <label for="tutorial-sort">Sort</label>

          <select id="tutorial-sort">
            <option value="latest">Latest first</option>
            <option value="oldest">Oldest first</option>
          </select>

          <input
            id="tutorial-search"
            class="tutorial-search"
            type="text"
            placeholder="Search tutorials..."
          />

        </div>

      </div>

      <!-- LIST -->
      <section id="tutorials-list" class="grid">
        <p>Loading tutorials...</p>
      </section>

    </section>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="js/tutorial-loader.js"></script>

</body>
