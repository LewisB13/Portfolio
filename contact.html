<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact | Lewis Barrett Portfolio</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
</head>
<body>

<header class="site-header">
  <div class="nav-container">
    <a href="index.html" class="logo">Lewis Barrett Portfolio</a>
    <nav class="navbar">
      <a href="tutorials.html">Tutorials</a>
      <a href="contact.html" class="active">Contact</a>
      <a href="blog.html">Blog</a>
    </nav>
  </div>
</header>

<main class="container">
  <section class="page-header">
    <h1>Contact</h1>
    <p>Send me a message below.</p>
  </section>

  <section class="contact-section">
    <form id="contact-form" class="contact-form">

      <div class="form-row">
        <label>Name</label>
        <input type="text" name="name" required>
      </div>

      <div class="form-row">
        <label>Email</label>
        <input type="email" name="email" required>
      </div>

      <div class="form-row">
        <label>Phone (optional)</label>
        <input type="tel" name="phone">
      </div>

      <!-- 🔥 NEW SUBJECT FIELD -->
      <div class="form-row">
        <label>Subject</label>
        <input type="text" name="subject" placeholder="What is this about?" required>
      </div>

      <div class="form-row">
        <label>Message</label>
        <textarea name="message" rows="6" required></textarea>
      </div>

      <!-- spam protection -->
      <input type="text" name="company" class="hidden-field">

      <button type="submit" id="submit-btn">Send Message</button>
      <p id="status" class="form-status"></p>

    </form>
  </section>
</main>

<script>
emailjs.init({
  publicKey: "c1kQc6SrlPO-zgEWd"
});

const form = document.getElementById("contact-form");
const status = document.getElementById("status");
const submitBtn = document.getElementById("submit-btn");

form.addEventListener("submit", function(e) {
  e.preventDefault();

  if (form.company.value) return;

  status.textContent = "Sending...";
  submitBtn.disabled = true;

  emailjs.send("service_bsd7gqa", "portfoliociontact", {
    name: form.name.value,
    email: form.email.value,
    phone: form.phone.value || "Not provided",
    subject: form.subject.value,
    message: form.message.value
  })
  .then(() => {
    status.textContent = "Message sent successfully ✔";
    form.reset();
  })
  .catch((error) => {
    console.error(error);
    status.textContent = "Failed to send message ❌";
  })
  .finally(() => {
    submitBtn.disabled = false;
  });
});
</script>

</body>
</html>
