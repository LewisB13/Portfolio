<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact | Lewis Barrett Portfolio</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="nav-container">
      <a href="index.html" class="logo">Lewis Barrett Portfolio</a>
      <nav class="navbar">
        <a href="tutorials.html">Tutorials</a>
        <a href="contact.html" class="active">Contact</a>
        <a href="blog.html">Blog</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="page-header">
      <h1>Contact</h1>
      <p>If you would like to get in touch, send me a message below.</p>
    </section>

    <section class="contact-section">
      <form class="contact-form">
        <div class="form-row">
          <label for="name">Name</label>
          <input id="name" type="text" placeholder="Your name" />
        </div>

        <div class="form-row">
          <label for="email">Email</label>
          <input id="email" type="email" placeholder="Your email" />
        </div>

        <div class="form-row">
          <label for="message">Message</label>
          <textarea id="message" rows="6" placeholder="Your message"></textarea>
        </div>

        <button type="submit">Send Message</button>
      </form>
    </section>
  </main>
</body>
</html>
