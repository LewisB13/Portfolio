<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact | Lewis Barrett Portfolio</title>
  <link rel="stylesheet" href="styles.css" />

  <!-- EmailJS -->
  <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
  <script>
    (function () {
      emailjs.init("c1kQc6SrlPO-zgEW#d");
    })();
  </script>
</head>
<body>

<header class="site-header">
  <div class="nav-container">
    <a href="index.html" class="logo">Lewis Barrett Portfolio</a>
    <nav class="navbar">
      <a href="tutorials.html">Tutorials</a>
      <a href="contact.html" class="active">Contact</a>
      <a href="blog.html">Blog</a>
    </nav>
  </div>
</header>

<main class="container">

  <section class="page-header">
    <h1>Contact</h1>
    <p>If you'd like to get in touch, send me a message below.</p>
  </section>

  <section class="contact-section">

    <form id="contact-form" class="contact-form">

      <div class="form-row">
        <label>Name</label>
        <input type="text" name="name" required>
      </div>

      <div class="form-row">
        <label>Email</label>
        <input type="email" name="email" required>
      </div>

      <div class="form-row">
        <label>Phone (optional)</label>
        <input type="tel" name="phone">
      </div>

      <div class="form-row">
        <label>Message</label>
        <textarea name="message" rows="6" required></textarea>
      </div>

      <!-- anti-spam -->
      <input type="text" name="company" class="hidden-field">

      <button type="submit">Send Message</button>

      <p id="form-status" class="form-status"></p>

    </form>

  </section>

</main>

<script>
const form = document.getElementById("contact-form");
const statusText = document.getElementById("form-status");

form.addEventListener("submit", function (e) {
  e.preventDefault();

  // spam protection
  if (form.company.value) return;

  statusText.textContent = "Sending...";

  emailjs.sendForm(
    "portfolio",
    "portfoliociontact",
    form
  ).then(function () {
    statusText.textContent = "Message sent successfully ✔";
    form.reset();
  }).catch(function (error) {
    statusText.textContent = "Failed to send message.";
    console.log(error);
  });
});
</script>

</body>
</html>
