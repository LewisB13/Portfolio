<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact | Lewis Barrett Portfolio</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
</head>
<body>

<header class="site-header">
  <div class="nav-container">
    <a href="index.html" class="logo">Lewis Barrett Portfolio</a>
    <nav class="navbar">
      <a href="tutorials.html">Tutorials</a>
      <a href="contact.html" class="active">Contact</a>
      <a href="blog.html">Blog</a>
    </nav>
  </div>
</header>

<main class="container">
  <section class="page-header">
    <h1>Contact</h1>
    <p>Send me a message below.</p>
  </section>

  <section class="contact-section">
    <form id="contact-form" class="contact-form">
      <div class="form-row">
        <label for="name">Name</label>
        <input id="name" type="text" name="name" required />
      </div>

      <div class="form-row">
        <label for="email">Email</label>
        <input id="email" type="email" name="email" required />
      </div>

      <div class="form-row">
        <label for="phone">Phone (optional)</label>
        <input id="phone" type="tel" name="phone" />
      </div>

      <div class="form-row">
        <label for="message">Message</label>
        <textarea id="message" name="message" rows="6" required></textarea>
      </div>

      <input type="text" name="company" class="hidden-field" tabindex="-1" autocomplete="off" />

      <button type="submit" id="submit-btn">Send Message</button>
      <p id="status" class="form-status"></p>
    </form>
  </section>
</main>

<script>
emailjs.init({
  publicKey: "c1kQc6SrlPO-zgEW#d"
});

const form = document.getElementById("contact-form");
const status = document.getElementById("status");
const submitBtn = document.getElementById("submit-btn");

form.addEventListener("submit", function(e) {
  e.preventDefault();

  if (form.company.value) return;

  status.textContent = "Sending...";
  submitBtn.disabled = true;

  emailjs.send("service_bsd7gqa", "portfoliociontact", {
    name: form.name.value,
    email: form.email.value,
    phone: form.phone.value || "Not provided",
    message: form.message.value
  })
  .then(() => {
    status.textContent = "Message sent successfully.";
    form.reset();
  })
  .catch((error) => {
    console.error("EmailJS error:", error);
    status.textContent = "Failed to send message.";
  })
  .finally(() => {
    submitBtn.disabled = false;
  });
});
</script>

</body>
</html>
