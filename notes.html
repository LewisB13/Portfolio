<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notes | Lewis Barrett Portfolio</title>

  <link rel="stylesheet" href="styles.css" />
</head>

<body>

  <!-- ================= HEADER (UNCHANGED) ================= -->
  <header class="site-header">
    <div class="nav-container">

      <a href="index.html" class="logo">Lewis Barrett Portfolio</a>

      <nav class="navbar">
        <a href="index.html">Home</a>
        <a href="projects.html">Projects</a>
        <a href="tutorials.html">Tutorials</a>
        <a href="notes.html" class="active">Notes</a>
        <a href="contact.html">Contact</a>
        <a href="https://github.com/lewisb13" target="_blank">GitHub</a>
      </nav>

    </div>
  </header>

  <!-- ================= MAIN ================= -->
  <main class="container">

    <!-- ================= HEADER ================= -->
    <section class="page-header">

      <h1>Notes</h1>

      <p>
        Quick technical notes, ideas, and reference snippets.
      </p>

      <!-- CONTROLS BAR -->
      <div class="sort-bar">

        <select id="notes-category">
          <option value="All">All Notes</option>
          <option value="Linux">Linux</option>
          <option value="Networking">Networking</option>
          <option value="Docker">Docker</option>
          <option value="Homelab">Homelab</option>
          <option value="Web Development">Web Development</option>
          <option value="Security">Security</option>
          <option value="Programming">Programming</option>
          <option value="Cheatsheets">Cheatsheets</option>
          <option value="Ideas">Ideas</option>
          <option value="Other">Other</option>
        </select>

        <input
          id="notes-search"
          class="tutorial-search"
          type="text"
          placeholder="Search notes..."
        />

      </div>

    </section>

    <!-- ================= NOTES GRID ================= -->
    <section id="notes-list" class="grid">
      <p>Loading notes...</p>
    </section>

  </main>

  <!-- ================= SCRIPTS ================= -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
