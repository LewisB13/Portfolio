<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Projects | Lewis Barrett Portfolio</title>

  <link rel="stylesheet" href="styles.css" />
</head>

<body>

  <!-- ================= HEADER ================= -->
  <header class="site-header">
    <div class="nav-container">

      <a href="index.html" class="logo">Lewis Barrett Portfolio</a>

      <nav class="navbar">
        <a href="index.html">Home</a>
        <a href="projects.html" class="active">Projects</a>
        <a href="tutorials.html">Tutorials</a>
        <a href="notes.html">Notes</a>
        <a href="contact.html">Contact</a>
        <a href="https://github.com/lewisb13" target="_blank">GitHub</a>
      </nav>

    </div>
  </header>

  <!-- ================= MAIN ================= -->
  <main class="container">

    <!-- ================= PAGE HEADER ================= -->
    <section class="page-header">
      <h1>Projects</h1>
      <p>
        A collection of homelab builds, Linux tools, Docker systems, and real-world experiments.
      </p>
    </section>

    <!-- ================= CATEGORY GRID ================= -->
    <section class="category-grid" id="project-category-grid">
      <p>Loading categories...</p>
    </section>

    <!-- ================= CONTROLS ================= -->
    <section class="video-panel">

      <div class="video-panel-top">

        <h2 id="selected-category-title">Latest Projects</h2>

        <div class="sort-bar">

          <label for="project-sort">Sort</label>

          <select id="project-sort">
            <option value="latest">Latest first</option>
            <option value="oldest">Oldest first</option>
          </select>

          <!-- SEARCH BAR (same style as notes/tutorials) -->
          <input
            id="project-search"
            type="text"
            placeholder="Search projects..."
            class="tutorial-search"
          />

        </div>

      </div>

      <!-- ================= PROJECT LIST ================= -->
      <section id="projects-list" class="grid">
        <p>Loading projects...</p>
      </section>

    </section>

  </main>

  <!-- ================= SCRIPTS ================= -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="js/projects-loader.js"></script>

</body>

</html>
